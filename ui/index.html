<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwitchBot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
    </script>
</head>

<body class="mascot-active">

    <!-- Camada de Glow Ambiente (reage às emoções) -->
    <div id="bg-glow"></div>
    <!-- Canvas 3D Three.js -->
    <div id="canvas-container"></div>

    <!-- ======================== HEADER (SÓ APARECE NO MODO CHAT) ======================== -->
    <header class="header" id="dragArea">
        <div class="header-left">
            <div class="status-dot" id="statusDot"></div>
            <span class="header-title">SwitchBot</span>
            <span class="status-label" id="statusLabel">Online</span>
        </div>
        <div class="header-right">
            <span class="model-badge" id="modelBadge">—</span>
            <button class="icon-btn" id="btnToggleMode" title="Modo Mascote">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12h4l2-9 5 18 3-10h6"></path>
                </svg>
            </button>
            <button class="icon-btn" id="btnSettings" title="Configurações">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
            </button>
        </div>
    </header>

    <main class="main-container">

        <!-- ======================== MODO MASCOTE ======================== -->
        <div id="mascotView" class="view-mode mascot-mode">

            <!-- Overlay flutuante: balão + botão chat -->
            <div class="mascot-overlay" id="mascotWrapper">

                <!-- Balão de Diálogo (dinâmico, sem corte) -->
                <div class="speech-bubble hidden" id="mascotSpeechBubble">
                    <div class="speech-content" id="mascotText"></div>
                    <div class="typing-indicator hidden" id="mascotTyping">
                        <span></span><span></span><span></span>
                    </div>
                </div>

                <!-- Botão abrir chat -->
                <button class="m-btn-chat" id="mBtnChat" title="Abrir Chat">💬 Abrir Chat</button>
            </div>

            <!-- Gamificação: Barra de XP -->
            <div class="xp-container" id="xpContainer">
                <div class="xp-header">
                    <span class="xp-level">Nível 1</span>
                    <span class="xp-title">SwitchBot Aprendiz</span>
                </div>
                <div class="xp-bar">
                    <div class="xp-fill" style="width: 15%;"></div>
                </div>
            </div>
        </div>

        <!-- ======================== MODO CHAT (CLÁSSICO) ======================== -->
        <div id="chatView" class="view-mode chat-mode hidden">
            <div class="timeline" id="timeline">
                <div class="welcome-msg" id="welcomeMsg">
                    <div class="welcome-icon">🤖</div>
                    <h2>Modo Desenvolvedor</h2>
                    <p>Histórico completo de ações e pensamentos.</p>
                </div>
            </div>

            <div class="quick-actions" id="quickActions">
                <button class="chip" data-prompt="Pesquise na internet sobre ">🔍 Pesquisar</button>
                <button class="chip" data-prompt="Abra o programa ">📂 Abrir App</button>
                <button class="chip" data-prompt="Execute no terminal: ">💻 Terminal</button>
            </div>
        </div>
    </main>

    <div class="stop-bar hidden" id="stopBar">
        <button class="stop-btn" id="stopBtn"><span class="stop-icon">■</span> Parar Tarefa</button>
    </div>

    <!-- Input Area -->
    <div class="input-area" id="inputArea">
        <input type="text" id="userInput" placeholder="O que vamos fazer agora?" autocomplete="off" autofocus>
        <button id="sendBtn" title="Enviar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

    <!-- PAINEL DE CONFIGURAÇÕES -->
    <div class="settings-overlay hidden" id="settingsOverlay"></div>
    <div class="settings-panel hidden" id="settingsPanel">
        <div class="settings-header">
            <span>⚙️ Configurações</span>
            <button class="icon-btn" id="btnCloseSettings">✕</button>
        </div>
        <div class="provider-toggle">
            <button class="provider-btn active" id="btnCloud" data-provider="groq">☁️ Cloud</button>
            <button class="provider-btn" id="btnLocal" data-provider="ollama">🖥️ Local</button>
        </div>
        <div class="provider-section" id="sectionCloud">
            <div class="models-loading" id="groqLoading">
                <div class="mini-spinner"></div> Carregando...
            </div>
            <div class="model-list" id="groqModelList"></div>
        </div>
        <div class="provider-section hidden" id="sectionLocal">
            <div class="ollama-status" id="ollamaStatus">
                <div class="mini-spinner"></div> Verificando Ollama...
            </div>
            <div id="installedSection" class="hidden">
                <h4 class="section-title">Instalados</h4>
                <div class="model-list" id="installedList"></div>
            </div>
            <div id="catalogSection" class="hidden">
                <h4 class="section-title">Para Download</h4>
                <div class="model-list" id="catalogList"></div>
            </div>
        </div>
        <div class="settings-footer">
            <button class="save-btn" id="btnSaveSettings">✓ Aplicar Configuração</button>
        </div>
    </div>

    <!-- ======================== ENGINE 3D (Three.js) ======================== -->
    <script type="module">
        import * as THREE from 'three';

        const container = document.getElementById('canvas-container');
        const bgGlow = document.getElementById('bg-glow');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // Luzes
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const mainLight = new THREE.DirectionalLight(0xffffff, 2);
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);
        const rimLight = new THREE.DirectionalLight(0xaaccff, 4);
        rimLight.position.set(-5, 5, -5);
        scene.add(rimLight);
        const fillLight = new THREE.DirectionalLight(0xffbbee, 1);
        fillLight.position.set(0, -5, 5);
        scene.add(fillLight);

        // Grupos
        const botGroup = new THREE.Group();
        const bodyGroup = new THREE.Group();
        botGroup.add(bodyGroup);
        scene.add(botGroup);

        // Material gelatina/nuvem
        const cloudMat = new THREE.MeshPhysicalMaterial({
            color: 0x88ccff, emissive: 0x112244,
            roughness: 0.2, metalness: 0.1,
            transmission: 0.8, thickness: 2.0,
            clearcoat: 0.5, clearcoatRoughness: 0.2
        });

        // Corpo procedural (esferas fundidas)
        const sphereGeo = new THREE.SphereGeometry(1, 64, 64);
        const centerBody = new THREE.Mesh(sphereGeo, cloudMat);
        centerBody.scale.set(1.4, 1.2, 1.2);
        bodyGroup.add(centerBody);

        [
            { x: -1.0, y: 0.2, z: 0.2, s: 0.8 },
            { x: 1.0, y: 0.2, z: 0.2, s: 0.8 },
            { x: -0.6, y: -0.6, z: 0.1, s: 0.7 },
            { x: 0.6, y: -0.6, z: 0.1, s: 0.7 },
            { x: 0, y: 0.8, z: 0.1, s: 0.9 },
            { x: 0, y: -0.8, z: 0, s: 0.6 }
        ].forEach(p => {
            const puff = new THREE.Mesh(sphereGeo, cloudMat);
            puff.position.set(p.x, p.y, p.z);
            puff.scale.setScalar(p.s);
            bodyGroup.add(puff);
        });

        // Olhos
        const eyeGroupBase = new THREE.Group();
        bodyGroup.add(eyeGroupBase);
        eyeGroupBase.position.set(0, 0.1, 1.15);

        const eyeBaseMat = new THREE.MeshStandardMaterial({ color: 0x050a14, roughness: 0.1, metalness: 0.8 });
        const sparkleMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

        function createEye() {
            const g = new THREE.Group();
            const bg = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), eyeBaseMat);
            bg.scale.set(0.8, 1.4, 0.4);
            g.add(bg);
            const s1 = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), sparkleMat);
            s1.position.set(-0.08, 0.15, 0.11);
            g.add(s1);
            const s2 = new THREE.Mesh(new THREE.SphereGeometry(0.03, 16, 16), sparkleMat);
            s2.position.set(0.08, -0.1, 0.11);
            g.add(s2);
            return g;
        }
        const eyeL = createEye(); eyeL.position.set(-0.5, 0, 0);
        const eyeR = createEye(); eyeR.position.set(0.5, 0, 0);
        eyeGroupBase.add(eyeL, eyeR);

        // Sistema de estados e emoções
        const engineState = {
            targetColor: new THREE.Color(0x88ccff),
            targetBodyScaleX: 1, targetBodyScaleY: 1,
            targetEyeScaleY: 1, targetEyeRotZ: 0, targetEyePosY: 0.1,
            isBlinking: false, isThinking: false
        };

        const emotions = {
            NEUTRAL:  { color: 0x88ccff, glow: 'rgba(136,204,255,0.1)',  bodyX: 1,    bodyY: 1,    eyeSY: 1,   eyeRZ: 0,    eyePY: 0.1 },
            JOY:      { color: 0xffbbee, glow: 'rgba(255,187,238,0.2)',  bodyX: 0.9,  bodyY: 1.1,  eyeSY: 0.2, eyeRZ: 0.2,  eyePY: 0.2 },
            SAD:      { color: 0x446688, glow: 'rgba(68,102,136,0.2)',   bodyX: 1.1,  bodyY: 0.85, eyeSY: 0.8, eyeRZ: -0.2, eyePY: 0.0 },
            ANGRY:    { color: 0xff4444, glow: 'rgba(255,68,68,0.2)',    bodyX: 1.15, bodyY: 0.9,  eyeSY: 0.6, eyeRZ: 0.3,  eyePY: 0.05 },
            SURPRISE: { color: 0xa855f7, glow: 'rgba(168,85,247,0.2)',   bodyX: 0.9,  bodyY: 1.2,  eyeSY: 1.5, eyeRZ: 0,    eyePY: 0.3 }
        };

        function setEmotion(key, intensity = 1.0) {
            const em = emotions[key] || emotions.NEUTRAL;
            const base = emotions.NEUTRAL;
            engineState.targetColor.copy(new THREE.Color(base.color).lerp(new THREE.Color(em.color), intensity));
            bgGlow.style.background = `radial-gradient(circle, ${em.glow} 0%, rgba(0,0,0,0) 70%)`;
            engineState.targetBodyScaleX = base.bodyX + (em.bodyX - base.bodyX) * intensity;
            engineState.targetBodyScaleY = base.bodyY + (em.bodyY - base.bodyY) * intensity;
            engineState.targetEyeScaleY  = base.eyeSY + (em.eyeSY - base.eyeSY) * intensity;
            engineState.targetEyePosY    = base.eyePY + (em.eyePY - base.eyePY) * intensity;
            engineState.targetEyeRotZ    = em.eyeRZ * intensity;
        }

        // Piscada autônoma
        function scheduleBlink() {
            setTimeout(() => {
                if (!engineState.isThinking) {
                    engineState.isBlinking = true;
                    setTimeout(() => { engineState.isBlinking = false; }, 150);
                }
                scheduleBlink();
            }, 2500 + Math.random() * 5000);
        }
        scheduleBlink();

        // Mouse tracking
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', e => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // Posição base: esquerda no desktop, centro no mobile
        let basePosX = 0, basePosY = 0;
        function updateLayout() {
            basePosX = window.innerWidth > 768 ? -2.2 : 0;
            basePosY = window.innerWidth > 768 ? 0 : 2.2;
        }
        updateLayout();

        // Loop de animação
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            if (!engineState.isThinking) {
                botGroup.rotation.y = THREE.MathUtils.lerp(botGroup.rotation.y, mouseX * 0.5, 0.05);
                botGroup.rotation.x = THREE.MathUtils.lerp(botGroup.rotation.x, -mouseY * 0.5, 0.05);
                botGroup.rotation.z = THREE.MathUtils.lerp(botGroup.rotation.z, -mouseX * 0.1, 0.05);
            }

            const floatAmp   = engineState.isThinking ? 0.2 : 0.15;
            const floatSpeed = engineState.isThinking ? 6 : 2;
            botGroup.position.x = THREE.MathUtils.lerp(botGroup.position.x, basePosX, 0.05);
            botGroup.position.y = THREE.MathUtils.lerp(botGroup.position.y, basePosY + Math.sin(time * floatSpeed) * floatAmp, 0.1);

            const pulseColor = engineState.targetColor.clone();
            if (engineState.isThinking) pulseColor.lerp(new THREE.Color(0xffffff), Math.sin(time * 10) * 0.2 + 0.2);
            cloudMat.color.lerp(pulseColor, 0.1);

            let sX = engineState.targetBodyScaleX;
            let sY = engineState.targetBodyScaleY;
            if (engineState.isThinking) { sX += Math.sin(time * 15) * 0.05; sY -= Math.sin(time * 15) * 0.05; }
            const breath = Math.sin(time * 2) * 0.02;
            bodyGroup.scale.x = THREE.MathUtils.lerp(bodyGroup.scale.x, sX + breath, 0.1);
            bodyGroup.scale.y = THREE.MathUtils.lerp(bodyGroup.scale.y, sY - breath, 0.1);
            bodyGroup.scale.z = THREE.MathUtils.lerp(bodyGroup.scale.z, (2 - sY) + breath, 0.1);

            const blinkSY = engineState.isBlinking ? 0.05 : engineState.targetEyeScaleY;
            eyeL.scale.y = THREE.MathUtils.lerp(eyeL.scale.y, blinkSY, 0.3);
            eyeL.rotation.z = THREE.MathUtils.lerp(eyeL.rotation.z, engineState.targetEyeRotZ, 0.1);
            eyeR.scale.y = THREE.MathUtils.lerp(eyeR.scale.y, blinkSY, 0.3);
            eyeR.rotation.z = THREE.MathUtils.lerp(eyeR.rotation.z, -engineState.targetEyeRotZ, 0.1);
            eyeGroupBase.position.y = THREE.MathUtils.lerp(eyeGroupBase.position.y, engineState.targetEyePosY, 0.1);
            eyeGroupBase.children.forEach(eye => {
                if (eye.children.length > 1) eye.children[1].position.y = 0.15 + Math.sin(time * 3) * 0.02;
            });

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateLayout();
        });

        // Animação de boas-vindas
        setTimeout(() => setEmotion('JOY', 0.7), 800);
        setTimeout(() => setEmotion('NEUTRAL', 1.0), 2800);

        // Expõe a engine para o script.js (não-módulo)
        window.botEngine = { setEmotion, engineState };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
